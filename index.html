<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slablands Survival</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="hud" class="hud hidden">
    <div class="hud-bottom">
      <div class="hotbar-stack">
        <div class="hud-readouts">
          <div id="healthShell" class="health-shell">
            <div id="healthFill" class="health-fill"></div>
            <span id="healthText">100 / 100</span>
          </div>
          <div id="infoPanel" class="info-panel"></div>
        </div>
        <div id="hotbarTop" class="hotbar hotbar-top"></div>
        <div id="hotbar" class="hotbar"></div>
      </div>
      <div class="gear-stack">
        <div id="gearSlots" class="gear-slots"></div>
      </div>
    </div>
    <div id="toast" class="toast hidden"></div>
  </div>

  <div id="startMenu" class="overlay start-menu">
    <div class="start-stack">
      <div class="start-logo">
        <span>Slablands</span>
        <strong>Survival</strong>
      </div>
      <div class="start-scene" aria-hidden="true">
        <i></i><i></i><i></i><i></i><i></i>
      </div>
      <p>A deep sandbox of ruins, machines, meteors, and strange things above the sky.</p>
      <div class="start-actions">
        <button id="continueBtn">Continue</button>
        <button id="newWorldBtn">New World</button>
      </div>
    </div>
  </div>

  <div id="menuOverlay" class="overlay menu-overlay hidden">
    <section class="menu-card">
      <header class="menu-head">
        <h2 id="menuTitle"></h2>
        <button id="closeMenuBtn" title="Close">X</button>
      </header>
      <div id="menuBody" class="menu-body"></div>
    </section>
  </div>

  <div id="deathOverlay" class="overlay death-overlay hidden">
    <div>
      <h2>You fell apart.</h2>
      <p>Your hotbar and armor are in a chest where you died. Press R to respawn.</p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
